      - "6G UL MIMO"
      - "massive MIMO 6G"
      - "beam management"

  # ---------- Higher layers & network ----------

  - name: Layer 2/3 (MAC, RLC, scheduling, RRC)
    weight: 0.9
    keywords:
      - "MAC scheduler"
      - "MAC scheduling"
      - "RLC"
      - "RRC"
      - "HARQ"
      - "DRX"
      - "QoS scheduling"
      - "URLLC scheduler"
      - "link adaptation"
      - "PDCP"

  - name: Core network & 6G core
    weight: 0.9
    keywords:
      - "5G core"
      - "5GC"
      - "6G core"
      - "service-based architecture"
      - "SBA"
