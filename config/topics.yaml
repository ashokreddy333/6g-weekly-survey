# Weights influence relevance scoring. Higher = more important to surface.
# Keywords are matched case-insensitively against title + abstract.
#
# A note on the section labels: the agent groups items in the report by the
# first matched topic. To get a dedicated "Demos & Trials" section, items
# that hit "implementation demos" / "field trial" keywords should match the
# 6G Demos & Trials topic FIRST. This is handled in src/filter.py via
# PRIORITY_TOPICS, so the order in this file does NOT need to put demos
# first; we list them last for readability.
topics:

  # ---------- Layer 1 (original focus) ----------

  - name: AI-native air interface
    weight: 1.0
    keywords:
      - "AI-native"
      - "AI native air interface"
      - "neural receiver"
      - "learned PHY"
      - "end-to-end learning"
      - "autoencoder air interface"

  - name: ISAC (sensing + communication)
    weight: 1.0
    keywords:
      - "ISAC"
      - "integrated sensing and communication"
      - "joint sensing communication"
      - "JCAS"
      - "radar communication"
      - "dual-function radar"

  - name: NTN / satellite
    weight: 0.9
    keywords:
      - "NTN"
      - "non-terrestrial network"
      - "LEO satellite"
      - "satellite 5G"
      - "satellite 6G"
      - "D2C"
      - "direct-to-cell"
      - "3GPP NTN"

  - name: Semantic communication
    weight: 1.0
    keywords:
      - "semantic communication"
      - "semantic coding"
      - "task-oriented communication"
      - "goal-oriented communication"
      - "semantic information theory"

  - name: Channel modeling / GAN-based
    weight: 0.9
    keywords:
      - "GAN channel"
      - "generative channel model"
      - "channel modeling"
      - "ray tracing channel"
      - "stochastic channel model"
      - "diffusion channel"

  - name: 6G Physical Layer
    weight: 1.0
    keywords:
      - "6G physical layer"
      - "6G PHY"
      - "6G waveform"
      - "6G channel coding"
      - "delay-Doppler"
      - "FR3"
      - "Advanced Power Amplifier"
